<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Global Freight & Container Matrix Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body
    class="bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-100 font-sans min-h-screen flex items-center justify-center p-4 lg:p-6 transition-colors duration-300"
  >
    <div
      class="w-full max-w-7xl bg-white dark:bg-slate-800/40 rounded-3xl border border-slate-200/80 dark:border-slate-700/50 shadow-2xl backdrop-blur-xl overflow-hidden grid grid-cols-1 lg:grid-cols-12 min-h-[800px]"
    >
      <div
        class="lg:col-span-7 p-6 lg:p-8 flex flex-col justify-between space-y-6 border-b lg:border-b-0 lg:border-r border-slate-200/80 dark:border-slate-700/50"
      >
        <div>
          <div
            class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6"
          >
            <div class="flex items-center gap-3">
              <span
                class="p-2.5 bg-sky-500/10 text-sky-600 dark:text-sky-400 rounded-xl border border-sky-500/20"
              >
                <i data-lucide="ship" class="w-5 h-5"></i>
              </span>
              <div>
                <h1
                  class="text-xl font-bold tracking-tight text-slate-900 dark:text-white"
                >
                  Intermodal Fleet Manager
                </h1>
                <p class="text-xs text-slate-500 dark:text-slate-400">
                  Technical Dimension Registry & Specifications
                </p>
              </div>
            </div>

            <button
              onclick="toggleTheme()"
              class="self-start sm:self-auto flex items-center gap-2 px-3.5 py-2 text-xs font-semibold rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-100 dark:bg-slate-900/60 hover:bg-slate-200 dark:hover:bg-slate-800 text-slate-600 dark:text-slate-300 transition-all active:scale-95 shadow-sm"
            >
              <span class="dark:hidden flex items-center gap-2"
                ><i data-lucide="moon" class="w-4 h-4"></i> Dark Deck Mode</span
              >
              <span class="hidden dark:flex items-center gap-2"
                ><i data-lucide="sun" class="w-4 h-4"></i> Light Deck Mode</span
              >
            </button>
          </div>

          <div class="flex flex-wrap gap-2 mb-6" id="filter-bar">
            <button
              onclick="filterFleet('all')"
              id="btn-all"
              class="px-3.5 py-1.5 rounded-lg text-xs font-bold tracking-wide uppercase transition-all bg-sky-600 text-white shadow-sm"
            >
              All Inventory
            </button>
            <button
              onclick="filterFleet('dry')"
              id="btn-dry"
              class="px-3.5 py-1.5 rounded-lg text-xs font-bold tracking-wide uppercase transition-all bg-slate-100 dark:bg-slate-900 text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-slate-200"
            >
              Dry & Open Top
            </button>
            <button
              onclick="filterFleet('rack')"
              id="btn-rack"
              class="px-3.5 py-1.5 rounded-lg text-xs font-bold tracking-wide uppercase transition-all bg-slate-100 dark:bg-slate-900 text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-slate-200"
            >
              Racks & Platforms
            </button>
            <button
              onclick="filterFleet('thermal')"
              id="btn-thermal"
              class="px-3.5 py-1.5 rounded-lg text-xs font-bold tracking-wide uppercase transition-all bg-slate-100 dark:bg-slate-900 text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-slate-200"
            >
              Reefer & Bulk
            </button>
          </div>

          <div
            class="grid grid-cols-1 sm:grid-cols-2 gap-3.5 overflow-y-auto max-h-[500px] pr-2 custom-scrollbar"
            id="fleet-grid"
          ></div>
        </div>

        <div
          class="pt-4 border-t border-slate-200 dark:border-slate-700/40 flex items-center justify-between text-xs text-slate-400 dark:text-slate-500"
        >
          <div class="flex items-center gap-2">
            <span
              class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"
            ></span>
            <span>ISO 1496 Certified Metrics</span>
          </div>
          <span>Total Registered: 12 Profiles</span>
        </div>
      </div>

      <div
        class="lg:col-span-5 bg-slate-50/50 dark:bg-slate-950/40 p-6 lg:p-8 flex flex-col justify-between space-y-6"
        id="inspector-panel"
      ></div>
    </div>

    <script>
      // Data Matrix carefully structuralized from all 5 supplied layout images
      const containerInventory = {
        // -- GROUP: DRY & OPEN TOP --
        "40_open_top": {
          name: "40′ Open Top Container",
          cat: "dry",
          tag: "Specialized Dry",
          bg: "from-amber-500/20 to-orange-500/5",
          txt: "text-amber-500",
          cbm: 66,
          cft: "2,345",
          length: "12.029 m (39′ 5 5/8″)",
          width: "2.342 m (7′ 8 1/2″)",
          height: "2.326 m (7′ 9 1/2″)",
          dWidth: "2.341 m (7′ 8″)",
          dHeight: "2.274 m (7′ 6 1/4″)",
        },
        "40_standard": {
          name: "40′ Standard Container",
          cat: "dry",
          tag: "Standard Dry",
          bg: "from-emerald-500/20 to-teal-500/5",
          txt: "text-emerald-500",
          cbm: 67,
          cft: "2,390",
          length: "12.029 m (39′ 5 1/2″)",
          width: "2.350 m (7′ 8 1/2″)",
          height: "2.392 m (7′ 10 1/8″)",
          dWidth: "2.340 m (7′ 8 1/8″)",
          dHeight: "2.292 m (7′ 6 1/4″)",
        },
        "40_high_cube": {
          name: "40′ High Cube Container",
          cat: "dry",
          tag: "Overheight Volume",
          bg: "from-indigo-500/20 to-blue-500/5",
          txt: "text-indigo-500",
          cbm: 76,
          cft: "2,694",
          length: "12.024 m (39′ 5 3/8″)",
          width: "2.350 m (7′ 8 1/2″)",
          height: "2.697 m (8′ 10 1/8″)",
          dWidth: "2.340 m (7′ 8″)",
          dHeight: "2.597 m (8′ 5 3/4″)",
        },
        "20_open_top": {
          name: "20′ Open Top Container",
          cat: "dry",
          tag: "Specialized Heavy",
          bg: "from-cyan-500/20 to-sky-500/5",
          txt: "text-cyan-500",
          cbm: 33,
          cft: "1,149",
          length: "5.888 m (19′ 4 1/8″)",
          width: "2.345 m (7′ 8 1/2″)",
          height: "2.315 m (7′ 9 1/2″)",
          dWidth: "2.286 m (7′ 8″)",
          dHeight: "2.184 m (7′ 5 3/4″)",
        },

        // -- GROUP: FLAT RACKS & PLATFORMS --
        "20_flat_rack": {
          name: "20′ Flat Rack Container",
          cat: "rack",
          tag: "Heavy Machinery",
          bg: "from-purple-500/20 to-indigo-500/5",
          txt: "text-purple-500",
          cbm: "N/A",
          cft: "N/A",
          length: "5.698 m (19′ 9 3/4″)",
          width: "2.230 m (8′ 0″)",
          height: "2.255 m (7′ 3 1/8″)",
          dWidth: "N/A",
          dHeight: "N/A",
        },
        "40_flat_rack": {
          name: "40′ Flat Rack Container",
          cat: "rack",
          tag: "Out-Of-Gauge Load",
          bg: "from-fuchsia-500/20 to-pink-500/5",
          txt: "text-fuchsia-500",
          cbm: "N/A",
          cft: "N/A",
          length: "11.832 m (39′ 7 7/8″)",
          width: "2.228 m (7′ 3 1/2″)",
          height: "1.981 m (6′ 6″)",
          dWidth: "N/A",
          dHeight: "N/A",
        },
        "20_flat_collapsible": {
          name: "20′ Flat Rack Collapsible",
          cat: "rack",
          tag: "Modular Outbound",
          bg: "from-pink-500/20 to-rose-500/5",
          txt: "text-pink-500",
          cbm: "N/A",
          cft: "N/A",
          length: "5.675 m (18′ 6″)",
          width: "2.213 m (7′ 3″)",
          height: "2.270 m (7′ 4″)",
          dWidth: "N/A",
          dHeight: "N/A",
        },
        "20_platform": {
          name: "20′ Platform Deck",
          cat: "rack",
          tag: "Heavy Concentrate",
          bg: "from-orange-500/20 to-amber-500/5",
          txt: "text-orange-500",
          cbm: "N/A",
          cft: "N/A",
          length: "6.058 m (19′ 11″)",
          width: "2.438 m (8′ 0″)",
          height: "0.370 m (1′ 3″)",
          dWidth: "N/A",
          dHeight: "N/A",
        },
        "40_platform": {
          name: "40′ Platform Deck",
          cat: "rack",
          tag: "Oversized Project",
          bg: "from-yellow-500/20 to-orange-500/5",
          txt: "text-yellow-600 dark:text-yellow-400",
          cbm: "N/A",
          cft: "N/A",
          length: "12.192 m (39′ 12″)",
          width: "2.245 m (7′ 4″)",
          height: "0.648 m (2′ 1 1/2″)",
          dWidth: "N/A",
          dHeight: "N/A",
        },

        // -- GROUP: REEFER & BULK SPECIALTY --
        "20_reefer": {
          name: "20′ Refrigerated Container",
          cat: "thermal",
          tag: "Cold Chain Supply",
          bg: "from-blue-500/20 to-sky-500/5",
          txt: "text-blue-500",
          cbm: 30,
          cft: "1,056",
          length: "5.724 m (18′ 1 7/8″)",
          width: "2.286 m (7′ 3 10/11″)",
          height: "2.014 m (7′ 7 3/4″)",
          dWidth: "2.286 m (7′ 3/16″)",
          dHeight: "2.067 m (7′ 6 3/16″)",
        },
        "40_reefer": {
          name: "40′ Refrigerated Container",
          cat: "thermal",
          tag: "Cold Chain Supply",
          bg: "from-teal-500/20 to-emerald-500/5",
          txt: "text-teal-500",
          cbm: 60,
          cft: "2,120",
          length: "11.840 m (37′ 11 1/4″)",
          width: "2.286 m (7′ 6 1/4″)",
          height: "2.120 m (7′ 5″)",
          dWidth: "2.286 m (7′ 6″)",
          dHeight: "2.195 m (7′ 2 1/8″)",
        },
        "20_bulk": {
          name: "20′ Bulk Cargo Container",
          cat: "thermal",
          tag: "Granular & Powder",
          bg: "from-violet-500/20 to-purple-500/5",
          txt: "text-violet-500",
          cbm: 32,
          cft: "1,130",
          length: "5.934 m (19′ 5 1/2″)",
          width: "2.358 m (7′ 8 4/5″)",
          height: "2.340 m (7′ 8 1/8″)",
          dWidth: "2.335 m (7′ 8″)",
          dHeight: "2.292 m (7′ 6 1/4″)",
        },
        "40_tank": {
          name: "40′ Intermodal Tank",
          cat: "thermal",
          tag: "Liquid / Chemical",
          bg: "from-rose-500/20 to-red-500/5",
          txt: "text-rose-500",
          cbm: "N/A",
          cft: "N/A",
          length: "12.192 m (39′ 12″)",
          width: "2.245 m (7′ 4″)",
          height: "0.648 m (2′ 1 1/2″)",
          dWidth: "N/A",
          dHeight: "N/A",
        },
      };

      let selectedId = "40_standard";
      let currentFilter = "all";

      function init() {
        renderFleetGrid();
        updateInspector();
        lucide.createIcons();
      }

      // Dark/Light Theme Switching System
      function toggleTheme() {
        const documentHtml = document.documentElement;
        if (documentHtml.classList.contains("dark")) {
          documentHtml.classList.remove("dark");
        } else {
          documentHtml.classList.add("dark");
        }
        lucide.createIcons();
      }

      // Segment Categorization Filtering Engine
      function filterFleet(category) {
        currentFilter = category;
        const buttons = ["all", "dry", "rack", "thermal"];

        buttons.forEach((b) => {
          const btn = document.getElementById(`btn-${b}`);
          if (b === category) {
            btn.className =
              "px-3.5 py-1.5 rounded-lg text-xs font-bold tracking-wide uppercase transition-all bg-sky-600 text-white shadow-sm";
          } else {
            btn.className =
              "px-3.5 py-1.5 rounded-lg text-xs font-bold tracking-wide uppercase transition-all bg-slate-100 dark:bg-slate-900 text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-slate-200";
          }
        });
        renderFleetGrid();
      }

      // Render Dynamic Fleet Overview Selector Cards
      function renderFleetGrid() {
        const targetGrid = document.getElementById("fleet-grid");
        let htmlBuffer = "";

        Object.entries(containerInventory).forEach(([key, item]) => {
          if (currentFilter !== "all" && item.cat !== currentFilter) return;

          const isActive = key === selectedId;
          const activeStateStyles = isActive
            ? "border-sky-500 bg-slate-50 dark:bg-slate-800 ring-2 ring-sky-500/20 shadow-inner"
            : "border-slate-200 dark:border-slate-700/60 bg-white dark:bg-slate-800/30 hover:border-slate-400 dark:hover:border-slate-600 hover:bg-slate-50 dark:hover:bg-slate-800/80";

          htmlBuffer += `
                    <div onclick="selectAsset('${key}')" class="group p-4 rounded-xl border transition-all duration-200 cursor-pointer flex flex-col justify-between space-y-3.5 ${activeStateStyles}">
                        <div class="space-y-1">
                            <div class="flex items-center justify-between">
                                <span class="text-[9px] font-bold uppercase tracking-wider px-2 py-0.5 rounded bg-slate-100 dark:bg-slate-900 border border-slate-200 dark:border-slate-700/60 text-slate-500 dark:text-slate-400">${item.tag}</span>
                                <i data-lucide="arrow-right-to-line" class="w-3.5 h-3.5 text-slate-400 opacity-0 group-hover:opacity-100 group-hover:translate-x-0.5 transition-all"></i>
                            </div>
                            <h3 class="font-bold text-xs sm:text-sm text-slate-900 dark:text-white group-hover:text-sky-600 dark:group-hover:text-sky-400 transition-colors line-clamp-1">${item.name}</h3>
                        </div>
                        
                        <div class="grid grid-cols-2 gap-2 pt-2 border-t border-slate-100 dark:border-slate-700/30">
                            <div>
                                <p class="text-[9px] text-slate-400 dark:text-slate-500 uppercase tracking-wide">Capacity</p>
                                <p class="text-xs font-bold text-slate-700 dark:text-slate-300">${item.cbm === "N/A" ? "N/A" : item.cbm + " m³"}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-[9px] text-slate-400 dark:text-slate-500 uppercase tracking-wide">Length Ref</p>
                                <p class="text-[11px] font-medium text-slate-600 dark:text-slate-400">${item.length.split("m")[0].trim()} m</p>
                            </div>
                        </div>
                    </div>
                `;
        });
        targetGrid.innerHTML = htmlBuffer;
        lucide.createIcons();
      }

      function selectAsset(id) {
        selectedId = id;
        renderFleetGrid();
        updateInspector();
      }

      // Hydrate Technical Specifications Inspector Interface Pane
      function updateInspector() {
        const panel = document.getElementById("inspector-panel");
        const data = containerInventory[selectedId];

        const capacityVisualHTML =
          data.cbm === "N/A"
            ? `<div class="relative z-10 w-full text-center">
                        <i data-lucide="ban" class="w-7 h-7 mx-auto mb-1 text-slate-400 opacity-60"></i>
                        <span class="text-lg font-black text-slate-500 uppercase tracking-wider">Uncapped / Flat Rack</span>
                   </div>`
            : `<div class="relative z-10 w-full max-w-[200px] h-16 border-2 border-dashed border-slate-300 dark:border-slate-600/40 rounded-lg flex items-center justify-center transform -rotate-1">
                        <div class="text-center">
                            <i data-lucide="box" class="w-5 h-5 mx-auto mb-0.5 ${data.txt}"></i>
                            <span class="text-lg font-black text-slate-900 dark:text-white">${data.cbm} m³ <span class="text-xs font-normal text-slate-500">(${data.cft} ft³)</span></span>
                        </div>
                   </div>`;

        panel.innerHTML = `
                <div class="space-y-6">
                    <div>
                        <div class="flex items-center justify-between mb-1">
                            <span class="text-[10px] font-bold text-sky-600 dark:text-sky-400 tracking-widest uppercase">Registry Asset Profile</span>
                            <div class="flex gap-1">
                                <span class="w-1.5 h-1.5 rounded-full bg-sky-500"></span>
                                <span class="w-1.5 h-1.5 rounded-full bg-slate-300 dark:bg-slate-700"></span>
                            </div>
                        </div>
                        <h2 class="text-lg font-extrabold text-slate-900 dark:text-white tracking-tight">${data.name}</h2>
                    </div>

                    <div class="bg-gradient-to-br ${data.bg} bg-slate-100/40 dark:bg-transparent border border-slate-200 dark:border-slate-700/60 rounded-2xl p-5 flex flex-col items-center justify-center relative overflow-hidden min-h-[130px]">
                        ${capacityVisualHTML}
                    </div>

                    <div class="space-y-4">
                        <div class="space-y-1.5">
                            <h4 class="text-xs font-bold uppercase tracking-wider text-slate-400 dark:text-slate-500 flex items-center gap-1.5">
                                <i data-lucide="maximize" class="w-3.5 h-3.5 text-sky-500"></i> Inside Core Clearances
                            </h4>
                            <div class="bg-slate-100/60 dark:bg-slate-900/60 border border-slate-200 dark:border-slate-800 rounded-xl p-3.5 space-y-2">
                                <div class="flex justify-between text-xs sm:text-sm">
                                    <span class="text-slate-500">Length</span>
                                    <span class="font-semibold text-slate-800 dark:text-slate-200">${data.length}</span>
                                </div>
                                <div class="flex justify-between text-xs sm:text-sm border-t border-slate-200 dark:border-slate-800/60 pt-2">
                                    <span class="text-slate-500">Width</span>
                                    <span class="font-semibold text-slate-800 dark:text-slate-200">${data.width}</span>
                                </div>
                                <div class="flex justify-between text-xs sm:text-sm border-t border-slate-200 dark:border-slate-800/60 pt-2">
                                    <span class="text-slate-500">Height</span>
                                    <span class="font-bold ${data.txt}">${data.height}</span>
                                </div>
                            </div>
                        </div>

                        <div class="space-y-1.5">
                            <h4 class="text-xs font-bold uppercase tracking-wider text-slate-400 dark:text-slate-500 flex items-center gap-1.5">
                                <i data-lucide="door-open" class="w-3.5 h-3.5 text-emerald-500"></i> Door Aperture Threshold
                            </h4>
                            <div class="bg-slate-100/60 dark:bg-slate-900/60 border border-slate-200 dark:border-slate-800 rounded-xl p-3.5 space-y-2">
                                <div class="flex justify-between text-xs sm:text-sm">
                                    <span class="text-slate-500">Aperture Width</span>
                                    <span class="font-semibold text-slate-800 dark:text-slate-200">${data.dWidth}</span>
                                </div>
                                <div class="flex justify-between text-xs sm:text-sm border-t border-slate-200 dark:border-slate-800/60 pt-2">
                                    <span class="text-slate-500">Aperture Height</span>
                                    <span class="font-semibold text-slate-800 dark:text-slate-200">${data.dHeight}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="bg-slate-100 dark:bg-slate-950/60 border border-slate-200 dark:border-slate-800 p-3 rounded-xl flex gap-2 text-[10px] text-slate-500 dark:text-slate-400 leading-relaxed">
                    <i data-lucide="help-circle" class="w-4 h-4 text-sky-500 shrink-0 mt-0.5"></i>
                    <p>Flat Rack and Platform assets do not contain enclosed rigid volumetric capacities (N/A) due to open layout constraints.</p>
                </div>
            `;
        lucide.createIcons();
      }

      window.onload = init;
    </script>
    <style>
      .custom-scrollbar::-webkit-scrollbar {
        width: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #64748b;
        border-radius: 8px;
      }
      .dark .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #334155;
      }
    </style>
  </body>
</html>
